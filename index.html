<html lang="en">

<meta charset="UTF-8"/>

<title>PropMY — Malaysia's No.1 Property Portal</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F5F5F5;color:#111}
select,input,button{font-family:inherit}
:root{
  --red:#CD1818;--red-dk:#A30000;--red-lt:#FFF0F0;
  --border:#E5E7EB;--grey:#6B7280;
  --shadow:0 2px 8px rgba(0,0,0,.09);
  --shadow-lg:0 8px 24px rgba(0,0,0,.14);
}

/* ── Header ─────────────────────────────────────────────────── */
.site-header{
  background:#fff;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:300;height:60px;
  display:flex;align-items:center;
}
.nav-btn{
  font-size:14px;font-weight:500;color:#374151;background:none;
  border:none;border-bottom:2.5px solid transparent;
  cursor:pointer;padding:4px 0;line-height:52px;
  transition:color .15s,border-color .15s;
}
.nav-btn:hover{color:var(--red)}
.nav-btn.active{color:var(--red);border-bottom-color:var(--red)}

/* ── Cards ──────────────────────────────────────────────────── */
.prop-card{
  background:#fff;border-radius:8px;border:1px solid var(--border);
  overflow:hidden;display:flex;flex-direction:column;
  transition:box-shadow .2s,transform .2s;cursor:pointer;
}
.prop-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.img-wrap{position:relative;height:196px;overflow:hidden;flex-shrink:0;background:#E5E7EB}
.img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .35s;display:block}
.prop-card:hover .img-wrap img{transform:scale(1.05)}
.img-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}

/* ── Badges ─────────────────────────────────────────────────── */
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:3px;letter-spacing:.3px}
.badge-sale{background:var(--red);color:#fff}
.badge-rent{background:#1D4ED8;color:#fff}
.badge-dark{background:rgba(0,0,0,.6);color:#fff}

/* ── Tags ───────────────────────────────────────────────────── */
.tag{font-size:11px;padding:3px 8px;border-radius:3px;border:1px solid var(--border);color:var(--grey);background:#FAFAFA;white-space:nowrap}
.tag-red{background:var(--red-lt);border-color:#FFCDD2;color:var(--red);font-weight:600}

/* ── Buttons ────────────────────────────────────────────────── */
.btn-red{background:var(--red);color:#fff;border:none;border-radius:5px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-red:hover{background:var(--red-dk)}
.btn-outline{background:#fff;color:var(--red);border:1.5px solid var(--red);border-radius:5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-outline:hover{background:var(--red-lt)}
.btn-ghost{background:none;border:none;cursor:pointer;color:var(--grey);transition:color .15s;display:flex;align-items:center;gap:4px}
.btn-ghost:hover{color:#111}

/* ── Sidebar ────────────────────────────────────────────────── */
.sb-section{border-bottom:1px solid var(--border);padding:14px 0}
.sb-section:last-child{border-bottom:none}
.sb-label{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:block}
.sb-btn{display:block;width:100%;text-align:left;font-size:13px;padding:6px 10px;border-radius:5px;border:none;cursor:pointer;transition:all .1s;color:#4B5563;background:transparent}
.sb-btn.on{background:var(--red-lt);color:var(--red);font-weight:700}
.sb-btn:not(.on):hover{background:#F3F4F6}

/* ── Search bar ─────────────────────────────────────────────── */
.search-box{background:#fff;border-radius:8px;display:flex;align-items:stretch;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.3)}
.sf{display:flex;align-items:center;gap:8px;padding:0 14px;min-width:0}
.sf input,.sf select{border:none;outline:none;font-size:14px;color:#111;background:transparent;width:100%;padding:14px 0}
.sf-div{width:1px;background:var(--border);flex-shrink:0;margin:10px 0}

/* ── Pagination ─────────────────────────────────────────────── */
.pg-btn{width:34px;height:34px;border-radius:5px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#374151}
.pg-btn.on{background:var(--red);border-color:var(--red);color:#fff}
.pg-btn:not(.on):not(:disabled):hover{border-color:var(--red);color:var(--red)}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── Toast ──────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1F2937;color:#fff;padding:10px 20px;border-radius:8px;
  font-size:13px;font-weight:600;white-space:nowrap;z-index:9999;
  transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── Modal ──────────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:10px;padding:28px 32px;width:340px;max-width:90vw;box-shadow:0 20px 50px rgba(0,0,0,.25)}

/* ── Misc ───────────────────────────────────────────────────── */
.trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip{font-size:11px;background:var(--red-lt);color:var(--red);padding:3px 9px;border-radius:3px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600;border:none}
.chip:hover{background:#FFD7D7}

@media(max-width:900px){.sidebar-wrap{display:none!important}}
@media(max-width:600px){
  .stat-grid{grid-template-columns:repeat(2,1fr)!important}
  .search-box{flex-direction:column}
  .sf-div{width:100%;height:1px;margin:0 10px}
}

/* ── Mobile nav ─────────────────────────────────────────────── */
.desktop-nav{display:flex;gap:20px}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;
  background:none;border:none;cursor:pointer;padding:6px;border-radius:5px}
.hamburger span{display:block;width:22px;height:2px;background:#374151;border-radius:2px;transition:all .25s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{
  display:none;position:fixed;top:60px;left:0;right:0;
  background:#fff;border-bottom:1px solid var(--border);
  z-index:299;box-shadow:0 8px 24px rgba(0,0,0,.12);
  flex-direction:column;padding:8px 0;
}
.mobile-menu.open{display:flex}
.mobile-menu-btn{
  display:flex;align-items:center;gap:10px;
  font-size:15px;font-weight:500;color:#374151;
  background:none;border:none;cursor:pointer;
  padding:12px 20px;text-align:left;width:100%;
  transition:background .12s;
}
.mobile-menu-btn:hover,.mobile-menu-btn.active{background:var(--red-lt);color:var(--red)}
.mobile-menu-divider{height:1px;background:var(--border);margin:6px 0}
.header-right-desktop{display:flex;align-items:center;gap:8px}
@media(max-width:768px){
  .desktop-nav{display:none!important}
  .hamburger{display:flex!important}
  .header-right-desktop .btn-ghost:first-child{display:none}
}

   TOAST HOOK
═══════════════════════════════════════════ */
function useToast(){
  const [msg,setMsg]=useState("");
  const [vis,setVis]=useState(false);
  const tid=useRef(null);
  const show=useCallback((m)=>{
    setMsg(m); setVis(true);
    clearTimeout(tid.current);
    tid.current=setTimeout(()=>setVis(false),2200);
  },[]);
  return {msg,vis,show};
}

function App(){
  const [tab,setTab]     = useState("Buy");

  const [priceIdx,setPriceIdx] = useState(0);
  const [selTypes,setSelTypes] = useState([]);
  const [selBeds,setSelBeds]   = useState(null);
  const [selTenure,setSelTenure]     = useState(null);
  const [selFurnished,setSelFurnished] = useState(null);
  const [saved,setSaved] = useState(new Set([1,7]));
  const [page,setPage]   = useState(1);
  const [sort,setSort]   = useState(SORT_OPTS[0]);
  const [showSignIn,setShowSignIn] = useState(false);
  const [showFreeAd,setShowFreeAd] = useState(false);
  const [mobileOpen,setMobileOpen] = useState(false);
  const toast = useToast();
  const PER_PAGE = 6;

  const isRent = tab==="Rent";
  const ranges = isRent ? RENT_RANGES : SALE_RANGES;

  function switchTab(t){setTab(t);setPage(1);setPriceIdx(0);setMobileOpen(false);}

  const filtered = useMemo(()=>{
    let list = ALL.filter(p=>{
      if(tab==="Rent") return p.listing==="For Rent";
      if(tab==="New Projects") return p.listing==="For Sale" && p.yr>=2021;
      return p.listing==="For Sale";
    });
    if(query.trim()){
      const q=query.toLowerCase().trim();
      list=list.filter(p=>
        p.name.toLowerCase().includes(q)||
        p.loc.toLowerCase().includes(q)||
        p.type.toLowerCase().includes(q)||
        p.agent.agency.toLowerCase().includes(q)
      );
    }
    if(selTypes.length) list=list.filter(p=>selTypes.includes(p.type));
    if(selBeds!==null)  list=list.filter(p=>p.beds>=selBeds);
    if(selTenure)       list=list.filter(p=>p.tenure===selTenure);
    if(selFurnished)    list=list.filter(p=>p.furnished===selFurnished);
    const r=ranges[priceIdx];
    list=list.filter(p=>p.price>=r.min&&p.price<=r.max);
    if(sort===SORT_OPTS[1]) list=[...list].sort((a,b)=>a.price-b.price);
    if(sort===SORT_OPTS[2]) list=[...list].sort((a,b)=>b.price-a.price);
    if(sort===SORT_OPTS[3]) list=[...list].sort((a,b)=>b.yr-a.yr);
    return list;
  },[tab,query,selTypes,selBeds,selTenure,selFurnished,priceIdx,sort,ranges]);

  const totalPages=Math.max(1,Math.ceil(filtered.length/PER_PAGE));
  const paged=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);

  function toggleType(t){setSelTypes(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);setPage(1);}
  function toggleSaved(id){setSaved(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});}
  function clearAll(){setSelTypes([]);setSelBeds(null);setSelTenure(null);setSelFurnished(null);setPriceIdx(0);setQuery("");setPage(1);}

  const activeCount=selTypes.length+(selBeds!==null?1:0)+(selTenure?1:0)+(selFurnished?1:0)+(priceIdx>0?1:0);

  // Quick search pills — mapped to actual words in the data
  const QUICK=[

    {label:"Iskandar Johor",q:"Iskandar"},
    {label:"Damansara",q:"Damansara"},

  return (
    <div>
      {/* ── Toast ─────────────────────────────────────────────── */}
      <div className={`toast${toast.vis?" show":""}`}>{toast.msg}</div>

      {/* ── Modals ────────────────────────────────────────────── */}

        <div style={{maxWidth:1280,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%"}}>

              <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#CD1818,#8B0000)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Ic n="Home" sz={17} col="#fff"/>
              </div>
              <div style={{lineHeight:1}}>
                <div>
                  <span style={{fontSize:17,fontWeight:900,color:"#111",letterSpacing:"-0.5px"}}>Prop</span>
                  <span style={{fontSize:17,fontWeight:900,color:"var(--red)",letterSpacing:"-0.5px"}}>MY</span>
                </div>
                <div style={{fontSize:8,color:"#9CA3AF",letterSpacing:".5px"}}>PROPERTY PORTAL</div>
              </div>

          {/* Right actions */}
          <div className="header-right-desktop">
            <button className="btn-ghost" style={{fontSize:13,padding:"6px 10px",borderRadius:5}}>
              <Ic n="HeartF" sz={14} col="var(--red)"/>
              <span>Saved ({saved.size})</span>
            </button>
            <button className="btn-ghost" style={{fontSize:13,padding:"6px 10px"}}
              onClick={()=>{setShowSignIn(true);setMobileOpen(false);}}>
              Sign In
            </button>
            <button className="btn-red" style={{fontSize:13,padding:"7px 14px",borderRadius:5}}
              onClick={()=>{setShowFreeAd(true);setMobileOpen(false);}}>
              Free Ad
            </button>

            {/* Hamburger — visible on mobile via CSS */}
            <button className={`hamburger${mobileOpen?" open":""}`}
              onClick={()=>setMobileOpen(v=>!v)}
              aria-label="Menu">
              <span/><span/><span/>
            </button>
          </div>
        </div>
      </div>

      {/* Mobile slide-down menu */}
      <div className={`mobile-menu${mobileOpen?" open":""}`}>
        {["Buy","Rent","New Projects","Commercial","Agents"].map(item=>(
          <button key={item} className={`mobile-menu-btn${tab===item?" active":""}`}
            onClick={()=>["Buy","Rent","New Projects","Commercial"].includes(item)
              ? switchTab(item) : setMobileOpen(false)}>
            <Ic n={item==="Buy"?"Home":item==="Rent"?"Bldg":item==="Agents"?"Users":"Search"} sz={16} col={tab===item?"var(--red)":"#9CA3AF"}/>
            {item}
            {tab===item&&<span style={{marginLeft:"auto",width:7,height:7,borderRadius:"50%",background:"var(--red)",flexShrink:0}}/>}
          </button>
        ))}
        <div className="mobile-menu-divider"/>
        <div style={{display:"flex",gap:8,padding:"8px 16px"}}>
          <button className="btn-outline" style={{flex:1,padding:"9px",fontSize:13,borderRadius:6}}
            onClick={()=>{setShowSignIn(true);setMobileOpen(false);}}>
            Sign In
          </button>
          <button className="btn-red" style={{flex:1,padding:"9px",fontSize:13,borderRadius:6}}
            onClick={()=>{setShowFreeAd(true);setMobileOpen(false);}}>
            Free Ad
          </button>
        </div>
      </div>

      {/* ════════════════════════════════════════════
          HERO
      ════════════════════════════════════════════ */}
      <div style={{background:"linear-gradient(160deg,#1A0000 0%,#3D0000 45%,#2D0A0A 100%)",padding:"44px 16px 36px"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:24}}>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.45)",textTransform:"uppercase",letterSpacing:".12em",marginBottom:10}}>
              🇲🇾 Malaysia's No.1 Property Portal
            </div>
            <h1 style={{fontSize:36,fontWeight:900,color:"#fff",letterSpacing:"-1px",lineHeight:1.1,margin:"0 0 8px"}}>
              Find Your Perfect Property<br/>
              <span style={{color:"#FF7070"}}>Anywhere in Malaysia</span>
            </h1>
            <p style={{color:"rgba(255,255,255,0.5)",fontSize:14}}>Condominiums · Landed Homes · Commercial · New Projects</p>
          </div>

          {/* Tab switcher */}
          <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
            <div style={{background:"rgba(255,255,255,0.08)",borderRadius:8,padding:4,display:"inline-flex",gap:2}}>
              {["Buy","Rent","New Projects"].map(t=>(
                <button key={t} onClick={()=>switchTab(t)}
                  style={{fontSize:13,fontWeight:700,padding:"7px 22px",borderRadius:6,border:"none",cursor:"pointer",transition:"all .15s",
                    background:tab===t?"#fff":"transparent",
                    color:tab===t?"var(--red)":"rgba(255,255,255,0.7)"}}>
                  {t}
                </button>
              ))}
            </div>
          </div>

          {/* Search box */}
          <div className="search-box" style={{maxWidth:900,margin:"0 auto"}}>
            <div className="sf" style={{flex:2,minWidth:220}}>
              <Ic n="Pin" sz={18} col="var(--red)"/>
              <input value={query} onChange={e=>{setQuery(e.target.value);setPage(1);}}
                placeholder="Search by location, project or property type…"/>
              {query&&(
                <button onClick={()=>{setQuery("");setPage(1);}}
                  style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexShrink:0,padding:2}}>
                  <Ic n="X" sz={14} col="#9CA3AF"/>
                </button>
              )}
            </div>
            <div className="sf-div"/>
            <div className="sf" style={{minWidth:170}}>
              <Ic n="Bldg" sz={15} col="#9CA3AF"/>
              <select onChange={e=>{if(e.target.value){toggleType(e.target.value);e.target.value="";}}} defaultValue="">
                <option value="">Property Type</option>
                {PROP_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div className="sf-div"/>
            <div className="sf" style={{minWidth:185}}>
              <Ic n="Home" sz={15} col="#9CA3AF"/>
              <select value={priceIdx} onChange={e=>{setPriceIdx(Number(e.target.value));setPage(1);}}>
                {ranges.map((r,i)=><option key={i} value={i}>{r.label}</option>)}
              </select>
            </div>
            <button className="btn-red"
              style={{padding:"0 28px",fontSize:14,borderRadius:0,display:"flex",alignItems:"center",gap:7,flexShrink:0,borderTopRightRadius:8,borderBottomRightRadius:8}}>
              <Ic n="Search" sz={16} col="#fff"/>Search
            </button>
          </div>

          {/* Quick search pills */}
          <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:14,flexWrap:"wrap"}}>
            {QUICK.map(s=>(
              <button key={s.label} onClick={()=>{setQuery(s.q);setPage(1);switchTab("Buy");}}
                style={{fontSize:11,padding:"4px 13px",borderRadius:999,background:"rgba(255,255,255,0.1)",
                  color:"rgba(255,255,255,0.75)",border:"1px solid rgba(255,255,255,0.18)",cursor:"pointer",fontWeight:500,transition:"all .15s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.18)"}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.1)"}}>
                {s.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ════════════════════════════════════════════
          STATS BAR
      ════════════════════════════════════════════ */}
      <div style={{background:"var(--red)",padding:"10px 20px"}}>
        <div style={{maxWidth:1280,margin:"0 auto"}}>
          <div className="stat-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {[
              {ic:"Bldg",n:"38,291",lb:"Active Listings"},
              {ic:"Users",n:"6,847",lb:"Verified Agents"},
              {ic:"Award",n:"96%",lb:"Satisfaction Rate"},
              {ic:"Clock",n:"16 Yrs",lb:"Market Leader"},
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
                <div style={{width:34,height:34,borderRadius:6,background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <Ic n={s.ic} sz={16} col="#fff"/>
                </div>
                <div>
                  <div style={{fontWeight:800,fontSize:17,color:"#fff",lineHeight:1}}>{s.n}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.78)"}}>{s.lb}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ════════════════════════════════════════════
          MAIN — Sidebar + Grid
      ════════════════════════════════════════════ */}
      <div style={{maxWidth:1280,margin:"0 auto",padding:"24px 20px",display:"flex",gap:22}}>

        {/* Sidebar */}
        <aside className="sidebar-wrap" style={{width:242,flexShrink:0}}>
          <div style={{position:"sticky",top:72}}>
            <Sidebar
              ranges={ranges} priceIdx={priceIdx} setPriceIdx={setPriceIdx}
              selTypes={selTypes} toggleType={toggleType}
              selBeds={selBeds} setSelBeds={setSelBeds}
              selTenure={selTenure} setSelTenure={setSelTenure}
              selFurnished={selFurnished} setSelFurnished={setSelFurnished}
              activeCount={activeCount} clearAll={clearAll} setPage={setPage}
            />
          </div>
        </aside>

        {/* Listings */}
        <div style={{flex:1,minWidth:0}}>

          {/* Toolbar */}
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{fontWeight:700,fontSize:16,color:"#111",margin:0}}>
                {filtered.length} {tab==="New Projects"?"New Projects":tab==="Rent"?"Rentals":"Properties"} in Malaysia
              </h2>
              <div style={{fontSize:12,color:"#6B7280",marginTop:2}}>
                {activeCount>0&&<span style={{color:"var(--red)",fontWeight:600}}>Filters active · </span>}
                Showing {paged.length} of {filtered.length} listings
              </div>
            </div>

            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {/* Active chips */}
              {selTypes.map(t=>(
                <button key={t} className="chip" onClick={()=>toggleType(t)}>
                  {t}<Ic n="X" sz={9} col="var(--red)"/>
                </button>
              ))}
              {selBeds!==null&&(
                <button className="chip" onClick={()=>{setSelBeds(null);setPage(1);}}>
                  {selBeds}+ Beds<Ic n="X" sz={9} col="var(--red)"/>
                </button>
              )}
              {selTenure&&(
                <button className="chip" onClick={()=>{setSelTenure(null);setPage(1);}}>
                  {selTenure}<Ic n="X" sz={9} col="var(--red)"/>
                </button>
              )}

              {/* Sort */}
              <div style={{display:"flex",alignItems:"center",gap:6,border:"1px solid var(--border)",borderRadius:6,padding:"6px 12px",background:"#fff"}}>
                <span style={{fontSize:10,color:"#9CA3AF",fontWeight:700,letterSpacing:".04em",flexShrink:0}}>SORT</span>
                <select value={sort} onChange={e=>{setSort(e.target.value);setPage(1);}}
                  style={{fontSize:13,color:"#111",background:"transparent",border:"none",outline:"none",cursor:"pointer",fontWeight:500}}>
                  {SORT_OPTS.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
          </div>

          {/* Empty state */}
          {filtered.length===0?(
            <div style={{textAlign:"center",padding:"80px 20px",background:"#fff",borderRadius:8,border:"1px solid var(--border)"}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
                <Ic n="Bldg" sz={52} col="#D1D5DB"/>
              </div>
              <div style={{fontWeight:700,fontSize:16,color:"#374151",marginBottom:6}}>No listings found</div>
              <div style={{fontSize:13,color:"#6B7280",marginBottom:20}}>Try a different search or clear your filters</div>
              <button onClick={clearAll} className="btn-red" style={{padding:"9px 24px",borderRadius:6,fontSize:14}}>
                Clear All Filters
              </button>
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:16}}>
              {paged.map(p=>(
                <PropCard key={p.id} p={p}
                  saved={saved.has(p.id)}
                  onSave={()=>toggleSaved(p.id)}
                  showToast={toast.show}/>
              ))}
            </div>
          )}

          {/* Pagination */}
          {totalPages>1&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:32}}>
              <button className="pg-btn" disabled={page===1} onClick={()=>setPage(p=>Math.max(1,p-1))}>
                <Ic n="ChL" sz={14}/>
              </button>
              {Array.from({length:totalPages},(_,i)=>i+1).map(n=>(
                <button key={n} className={`pg-btn${page===n?" on":""}`} onClick={()=>setPage(n)}>{n}</button>
              ))}
              <button className="pg-btn" disabled={page===totalPages} onClick={()=>setPage(p=>Math.min(totalPages,p+1))}>
                <Ic n="ChR" sz={14}/>
              </button>
            </div>
          )}
        </div>
      </div>

      {/* ════════════════════════════════════════════
          POPULAR SEARCHES
      ════════════════════════════════════════════ */}
      <div style={{background:"#fff",borderTop:"1px solid var(--border)",padding:"20px"}}>
        <div style={{maxWidth:1280,margin:"0 auto"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#111",marginBottom:12}}>Popular Searches in Malaysia</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {[
              {label:"Condo for Sale in KLCC",q:"KLCC",tab:"Buy"},
              {label:"Mont Kiara Rental",q:"Mont Kiara",tab:"Rent"},
              {label:"Petaling Jaya Terrace",q:"Petaling",tab:"Buy"},
              {label:"Penang Sea View Condo",q:"Penang",tab:"Buy"},
              {label:"Bangsar Furnished Suite",q:"Bangsar",tab:"Rent"},
              {label:"Johor Iskandar Invest",q:"Iskandar",tab:"Buy"},
              {label:"Damansara Heights Bungalow",q:"Damansara",tab:"Buy"},
              {label:"Desa ParkCity Lake View",q:"ParkCity",tab:"Rent"},
            ].map(s=>(
              <button key={s.label}
                onClick={()=>{setQuery(s.q);switchTab(s.tab);}}
                style={{fontSize:12,padding:"5px 14px",borderRadius:4,border:"1px solid var(--border)",background:"#FAFAFA",color:"#374151",cursor:"pointer",fontWeight:500,transition:"all .15s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--red)";e.currentTarget.style.color="var(--red)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.color="#374151";}}>
                🔍 {s.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ════════════════════════════════════════════
          FOOTER
      ════════════════════════════════════════════ */}
      <footer style={{background:"#1A0000",color:"#9CA3AF",padding:"40px 20px 24px"}}>
        <div style={{maxWidth:1280,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:32,marginBottom:32}}>
            <div style={{maxWidth:280}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:32,height:32,borderRadius:7,background:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <Ic n="Home" sz={15} col="#fff"/>
                </div>
                <span style={{color:"#fff",fontWeight:900,fontSize:17}}>Prop<span style={{color:"#FF7070"}}>MY</span></span>
              </div>
              <p style={{fontSize:12,lineHeight:1.7,marginBottom:14}}>Malaysia's most trusted property portal for buying, selling and renting residential and commercial properties nationwide.</p>
              <div style={{display:"flex",gap:8}}>
                {["App Store","Google Play"].map(s=>(
                  <button key={s}
                    style={{fontSize:11,padding:"5px 12px",borderRadius:5,border:"1px solid #3D0000",background:"transparent",color:"#6B7280",cursor:"pointer"}}
                    onClick={()=>toast.show(`${s} — coming soon!`)}>
                    {s}
                  </button>
                ))}
              </div>
            </div>

            <div style={{display:"flex",gap:44,flexWrap:"wrap"}}>
              {[
                ["For Seekers","Buy Property","Rent Property","New Projects","Commercial","Insights"],
                ["For Agents","List Property","Agent Login","Agent Directory","PropMY Academy"],
                ["Resources","Property Guide","Mortgage Calc","Market Report","Area Insights"],
                ["Company","About Us","Careers","Press Room","Contact Us","Advertise"],
              ].map(([title,...links])=>(
                <div key={title}>
                  <div style={{color:"#fff",fontWeight:700,fontSize:11,marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>{title}</div>
                  {links.map(l=>(
                    <div key={l} onClick={()=>toast.show(`${l} — coming soon!`)}
                      style={{fontSize:12,marginBottom:7,color:"#6B7280",cursor:"pointer",transition:"color .15s"}}
                      onMouseEnter={e=>e.currentTarget.style.color="#FF7070"}
                      onMouseLeave={e=>e.currentTarget.style.color="#6B7280"}>
                      {l}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>

          <div style={{borderTop:"1px solid #2D0000",paddingTop:16,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,fontSize:11}}>
            <span>© 2024 PropMY Sdn Bhd · All rights reserved · SSM: 202401234567</span>
            <span style={{display:"flex",gap:16}}>
              {["Privacy Policy","Terms of Use","Cookie Policy"].map(l=>(
                <span key={l} onClick={()=>toast.show(`${l} — coming soon!`)}
                  style={{cursor:"pointer",color:"#6B7280"}}
                  onMouseEnter={e=>e.currentTarget.style.color="#FF7070"}
                  onMouseLeave={e=>e.currentTarget.style.color="#6B7280"}>{l}</span>
              ))}
            </span>
          </div>
          <div style={{marginTop:8,fontSize:10,color:"#3D0000",fontWeight:600}}>
            ⚠ DEMO ONLY — All listings are fictional. Not a real property portal.
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
